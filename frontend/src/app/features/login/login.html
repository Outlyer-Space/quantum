<main id="login-page" [style.background-image]="backgroundUrl()" role="main">
    <!-- Left panel: sign-in form + footer -->
    <section class="content-panel" aria-label="Sign in panel">
        <div class="sign-in-area">
            <!-- Logo -->
            <img class="quantum-logo" src="media/logos/Quantum_Logo_White.png" alt="Quantum" width="430" height="106" />

            <!-- Login form -->
            <form class="login-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()" aria-label="Sign in form">
                <div class="input-row">
                    <span class="input-icon" aria-hidden="true">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18"
                            height="18">
                            <path
                                d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z" />
                        </svg>
                    </span>
                    <input id="login-email" type="text" formControlName="email" placeholder="Email" autocomplete="email"
                        aria-label="Email address" />
                </div>

                <div class="input-row">
                    <span class="input-icon" aria-hidden="true">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18"
                            height="18">
                            <path
                                d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z" />
                        </svg>
                    </span>
                    <input id="login-password" type="password" formControlName="password" placeholder="Password"
                        autocomplete="current-password" aria-label="Password" />
                </div>

                @if (flashMessage()) {
                <div class="flash-message" role="alert">
                    {{ flashMessage() }}
                </div>
                }

                <button id="login-submit" type="submit" class="sign-in-btn" [disabled]="isLoading()">
                    {{ isLoading() ? 'Signing In...' : 'Sign In with Email' }}
                </button>
            </form>
        </div>

        <!-- Footer tech logos -->
        <footer class="footer-logos" aria-label="Technology partners">
            <div class="logo-grid">
                @for (logo of logos(); track logo.alt) {
                <img [src]="logo.src" [alt]="logo.alt" loading="lazy" width="120" height="30" />
                }
            </div>
        </footer>
    </section>

    <!-- Image credit overlay -->
    <p class="image-credit">{{ imageCredit() }}</p>
</main>
